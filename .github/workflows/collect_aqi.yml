name: Collect Dhaka AQI + Rain + Flood Data

on:
  schedule:
    - cron: "0 8  * * *"   # 08:00 UTC → 14:00 BST (Afternoon)
    - cron: "0 14 * * *"   # 14:00 UTC → 20:00 BST (Evening)
    - cron: "0 20 * * *"   # 20:00 UTC → 02:00 BST (Night)
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          AQICN_TOKEN: ${{ secrets.AQICN_TOKEN }}
          OWM_TOKEN:   ${{ secrets.OWM_TOKEN }}
        run: python main.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dhaka_air_quality.csv
          git diff --cached --quiet || git commit -m "data: AQI+rain+flood $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
